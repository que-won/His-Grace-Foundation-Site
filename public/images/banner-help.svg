<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="helpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsla(270, 71%, 52%, 1);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsla(270, 71%, 42%, 1);stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#helpGrad)"/>
  <!-- Help/Medical icons -->
  <g opacity="0.2">
    <circle cx="150" cy="200" r="50" fill="white"/>
    <rect x="130" y="180" width="40" height="10" fill="hsla(270, 71%, 52%, 1)"/>
    <rect x="140" y="170" width="10" height="30" fill="hsla(270, 71%, 52%, 1)"/>
  </g>
  <g opacity="0.15">
    <circle cx="600" cy="200" r="40" fill="white"/>
    <text x="600" y="215" text-anchor="middle" font-size="60" fill="hsla(270, 71%, 52%, 1)">+</text>
  </g>
